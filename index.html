<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/home-page-styles.css">
  <script src="./assets/scripts/script.js"></script>
  <title>Spider-Man | Multiversos</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center; transition: opacity 0.5s;">
    <img src="./assets/images/icons/spider.svg" style="width:80px; animation: pulse 1s infinite;" alt="Carregando...">
  </div>

  <nav class="s-menu" aria-label="Navegação principal">
    <ul>
      <li class="s-menu__item">
        <a href="index.html">Página Inicial</a>
      </li>
      <li class="s-menu__item">
        <a href="./pages/tobey-maguire/spiderman1.html">Tobey Maguire</a>
      </li>
      <li class="s-menu__item s-menu__icon">
        <img src="./assets/images/icons/spider.svg" alt="Ícone Aranha - Spider-Man Multiverse">
      </li>
      <li class="s-menu__item">
        <a href="./pages/tom-holland/spiderman1.html">Tom Holland</a>
      </li>
      <li class="s-menu__item">
        <a href="./pages/andrew-garfield/spiderman1.html">Andrew Garfield</a>
      </li>
    </ul>
  </nav>

  <main class="s-container" aria-label="Seleção de versões do Homem-Aranha">
    <div class="s-cards-carousel" style="transform: translateZ(-40vw) rotateY(0deg);">
      
      <a href="./pages/tobey-maguire/spiderman1.html" class="s-card" id="spider-man-01" aria-label="Ver filmes do Homem-Aranha de Tobey Maguire">
        <img class="s-card__background" src="./assets/images/pic-sm-bg-01.jpg" alt="">
        <img class="s-card__image" src="./assets/images/spider-man-01.png" alt="Tobey Maguire uniformizado como Homem-Aranha">
        <h2 class="s-card__title">Tobey Maguire</h2>
      </a>

      <a href="./pages/andrew-garfield/spiderman1.html" class="s-card" id="spider-man-02" aria-label="Ver filmes do Homem-Aranha de Andrew Garfield">
        <img class="s-card__background" src="./assets/images/pic-sm-bg-02.jpg" alt="">
        <img class="s-card__image" src="./assets/images/spider-man-03.png" alt="Andrew Garfield uniformizado como Homem-Aranha">
        <h2 class="s-card__title">Andrew Garfield</h2>
      </a>

      <a href="./pages/tom-holland/spiderman1.html" class="s-card" id="spider-man-03" aria-label="Ver filmes do Homem-Aranha de Tom Holland">
        <img class="s-card__background" src="./assets/images/pic-sm-bg-03.jpg" alt="">
        <img class="s-card__image" src="./assets/images/spider-man-02.png" alt="Tom Holland uniformizado como Homem-Aranha">
        <h2 class="s-card__title">Tom Holland</h2>
      </a>
    </div>
  </main>

  <nav class="s-controller" aria-label="Controles do carrossel" role="region">
    <div id="1" onclick="selectCarouselItem(this)" class="s-controller__button s-controller__button--active" role="button" tabindex="0" aria-label="Exibir primeiro herói">
      01
    </div>
    <div id="2" onclick="selectCarouselItem(this)" class="s-controller__button" role="button" tabindex="0" aria-label="Exibir segundo herói">
      02
    </div>
    <div id="3" onclick="selectCarouselItem(this)" class="s-controller__button" role="button" tabindex="0" aria-label="Exibir terceiro herói">
      03
    </div>
    <div class="s-controller__line" aria-hidden="true"></div>
  </nav>

</body>
</html>
